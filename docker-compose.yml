services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: ["sh", "-c", "rm -f tmp/pids/server.pid && ruby bin/rails db:prepare && ruby bin/rails server -b 0.0.0.0"]
    environment:
      DB_HOST: db
      RAILS_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
      - storage_data:/rails/storage
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

volumes:
  db_data:
  bundle_data:
  storage_data:
